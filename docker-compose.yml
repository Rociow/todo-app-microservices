
services:
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taskdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5

  msvc-task:
    build: ./msvc-task
    container_name: task-service
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy   # 👈 espera que MySQL esté listo
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/taskdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"

  postgres:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: userdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  msvc-user:
    build: ./msvc-user
    container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy   # 👈 espera que PostgreSQL esté listo
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/userdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"

  mongodb:
    image: mongo:6.0
    container_name: mongo_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  msvc-notification:
    build: ./msvc-notification
    container_name: notification-service
    ports:
      - "8082:8082"
    depends_on:
      mongodb:
        condition: service_healthy   # 👈 espera que MongoDB esté listo
    environment:
      SPRING_APPLICATION_NAME: msvc-notification
      SERVER_PORT: 8082
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/notificationdb

  gateway:
    build: ./msvc-gateway
    container_name: api-gateway
    ports:
      - "8085:8080"   # expone el gateway en tu máquina en 8085
    depends_on:
      - msvc-user
      - msvc-task
      - msvc-notification
    environment:
      SPRING_APPLICATION_NAME: msvc-gateway
      SERVER_PORT: 8080
      JWT_SECRET: miClaveSecretaSuperSeguraParaJWT1234

volumes:
  mysql_data:
  postgres_data:
  mongo_data: